<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selkokielelle – Muunna teksti selkokielelle</title>
  <meta name="description" content="Ilmainen työkalu tekstin muuntamiseen selkokielelle tekoälyn avulla." />
  <link rel="canonical" href="https://selkokielelle.fi/" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta property="og:title" content="Selkokielelle – Muunna teksti selkokielelle" />
  <meta property="og:description" content="Ilmainen työkalu tekstin muuntamiseen selkokielelle tekoälyn avulla." />
  <meta property="og:url" content="https://selkokielelle.fi/" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #F9F8F6;
      --ink:      #1C1B19;
      --mid:      #6B6860;
      --faint:    #908C83;
      --rule:     #D0CCBF;
      --accent:   #2C4BFF;
      --surface:  #FFFFFF;
      --radius:   10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 17px;
      height: 100vh;
      height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── WRAPPER ── */
    .wrap {
      width: 100%;
      max-width: 640px;
      padding: 0 1.5rem;
      flex: 1;
    }

    /* ── TOP ── */
    .top {
      padding: 3.5rem 0 2.8rem;
      animation: fadein .5s ease both;
    }

    .wordmark {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      letter-spacing: -.01em;
      color: var(--ink);
      margin-bottom: .55rem;
    }

    .tagline {
      font-size: .9rem;
      color: var(--mid);
      font-weight: 400;
    }

    /* ── RULE ── */
    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2rem;
      animation: fadein .5s .05s ease both;
    }

    /* ── EDITOR BLOCK ── */
    .editor {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.04);
      animation: fadein-slide .5s .1s ease both;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .editor.appeared {
      opacity: 1;
    }

    .editor-header {
      padding: .7rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
    }

    .editor-label {
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .char-count {
      font-size: .78rem;
      color: var(--faint);
      font-variant-numeric: tabular-nums;
      transition: color .2s;
    }
    .char-count.warn { color: #C07A20; }
    .char-count.over { color: #C0392B; }

    .limit-hint {
      display: none;
      font-size: .78rem;
      color: #C0392B;
      padding: .35rem 1rem .4rem;
      border-top: 1px solid #F5C6C2;
    }
    .limit-hint.visible { display: block; }

    textarea {
      display: block;
      width: 100%;
      height: 300px;
      padding: 1.1rem 1rem;
      border: none;
      outline: none;
      resize: vertical;
      overflow-y: auto;
      overflow-wrap: break-word;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--ink);
      background: transparent;
      caret-color: var(--accent);
      transition: opacity 0.25s ease;
    }


    textarea::placeholder { color: var(--faint); }

    .wrap:has(.output.state-done) .editor:not(:focus-within) { opacity: 0.7; }

    /* ── ACTION ROW ── */
    .action-row {
      padding: .75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--rule);
      background: var(--bg);
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      padding: .5rem 1.2rem;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--ink);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { opacity: .82; }

    .btn-primary:disabled {
      opacity: .28;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--mid);
      border: 1px solid var(--rule);
      font-size: .75rem;
      padding: .5rem .9rem;
    }

    .btn-ghost:hover { background: var(--bg); }

    .btn-ghost:disabled {
      opacity: .28;
      cursor: not-allowed;
    }

    /* spinner */
    .spinner {
      width: 13px; height: 13px;
      border: 1.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .is-loading .spinner { display: block; }
    .is-loading .btn-arrow { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ARROW DIVIDER ── */
    .arrow-sep {
      display: flex;
      justify-content: center;
      padding: .9rem 0;
      animation: fadein .5s .15s ease both;
      color: var(--faint);
    }

    .arrow-sep svg { width: 18px; height: 18px; }

    /* ── OUTPUT ── */
    .output {
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.04);
      animation: fadein .5s .2s ease both;
    }

    .output-header {
      padding: .7rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
    }

    .output-body {
      padding: 1.1rem 1rem;
      height: 300px;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
    }

    .output-empty {
      font-size: 1rem;
      color: var(--faint);
      font-weight: 300;
      line-height: 1.75;
    }

    /* skeleton shimmer */
    .skeleton { display: none; flex-direction: column; gap: .55rem; width: 100%; }

    .sk-line {
      height: .95em;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--rule) 25%, #ECEAE4 50%, var(--rule) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.3s infinite;
    }

    .sk-line:nth-child(1) { width: 100%; }
    .sk-line:nth-child(2) { width: 88%; }
    .sk-line:nth-child(3) { width: 95%; }
    .sk-line:nth-child(4) { width: 72%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #output-text {
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 300;
      color: var(--ink);
      opacity: 0;
      transition: opacity .35s ease;
      width: 100%;
      overflow-wrap: break-word;
    }

    #output-text p {
      margin: 0 0 1em 0;
    }

    #output-text p:last-child {
      margin-bottom: 0;
    }

    #output-text.visible { opacity: 1; }

    /* states */
    .state-empty  .output-empty   { display: flex; }
    .state-empty  .skeleton        { display: none; }
    .state-empty  #output-text     { display: none; }

    .state-loading .output-empty  { display: none; }
    .state-loading .skeleton       { display: flex; }
    .state-loading #output-text    { display: none; }

    .state-done   .output-empty   { display: none; }
    .state-done   .skeleton        { display: none; }
    .state-done   #output-text     { display: block; }

    /* copy row */
    .copy-row {
      padding: .75rem 1rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: flex-end;
      background: var(--bg);
    }

    /* ── FOOTER ── */
    footer {
      padding: 2.5rem 0 3rem;
      font-size: .72rem;
      color: var(--faint);
      text-align: center;
      animation: fadein .5s .25s ease both;
    }

    footer a { color: var(--mid); text-decoration: none; border-bottom: 1px solid var(--rule); }
    footer a:hover { color: var(--ink); border-color: var(--ink); }

    /* ── ANIMATIONS ── */
    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* slide-only variant: no opacity in keyframes so fill-mode won't lock it */
    @keyframes fadein-slide {
      from { transform: translateY(8px); }
      to   { transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .top { padding: 2.5rem 0 2rem; }
    }

    /* Desktop layout: side-by-side */
    @media (min-width: 800px) {
      body {
        overflow: hidden;
      }

      .wrap {
        max-width: 1080px;
        min-height: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto 1fr auto;
        column-gap: 2rem;
        row-gap: 1rem;
        align-items: stretch;
      }

      .wordmark {
        font-size: 2rem;
      }

      .top {
        grid-column: 1 / -1;
        padding: 2rem 0 1.5rem;
      }

      hr {
        grid-column: 1 / -1;
        margin-bottom: 0;
      }

      .editor {
        grid-column: 1;
        grid-row: 3;
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        min-height: 0;
        min-width: 0;
      }

      .editor textarea {
        height: auto;
        min-height: 0;
        resize: none;
      }

      .arrow-sep {
        display: none;
      }

      .output {
        grid-column: 2;
        grid-row: 3;
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 0;
        min-width: 0;
      }

      .output-body {
        height: auto;
        min-height: 0;
        overflow-y: auto;
      }

      footer {
        grid-column: 1 / -1;
        padding: 2rem 0 3rem;
      }
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="top">
    <div class="wordmark">Selkokielelle</div>
    <div class="tagline">Muunna teksti selkokielelle.</div>
  </div>

  <hr>

  <!-- INPUT -->
  <div class="editor" id="editor">
    <div class="editor-header">
      <span class="editor-label">Teksti</span>
      <span class="char-count" id="char-count">0 / 5000</span>
    </div>
    <textarea
      id="input-text"
      placeholder="Kirjoita tai liitä teksti tähän…"
      rows="7"
      aria-label="Syötä muunnettava teksti"
    ></textarea>
    <div class="action-row">
      <button class="btn btn-ghost" id="clear-btn" type="button" disabled>Tyhjennä</button>
      <button class="btn btn-primary" id="convert-btn" disabled>
        <div class="spinner"></div>
        <svg class="btn-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
        Muunna
      </button>
    </div>
    <div class="limit-hint" id="limit-hint" aria-live="polite">Teksti on liian pitkä. Lyhennä alle 5 000 merkkiin.</div>
  </div>

  <!-- DIVIDER -->
  <div class="arrow-sep" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
    </svg>
  </div>

  <!-- OUTPUT -->
  <div class="output state-empty" id="output-wrap">
    <div class="output-header">
      <span class="editor-label">Selkokieli</span>
    </div>
    <div class="output-body">
      <div class="output-empty">Tulos ilmestyy tähän</div>
      <div class="skeleton" id="skeleton">
        <div class="sk-line"></div>
        <div class="sk-line"></div>
        <div class="sk-line"></div>
        <div class="sk-line"></div>
      </div>
      <div id="output-text" role="region" aria-live="polite"></div>
    </div>
    <div class="copy-row" id="copy-row">
      <button class="btn btn-ghost" id="copy-btn" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Kopioi
      </button>
    </div>
  </div>

  <footer>
    <a href="laajennos.html">Selainlaajennus</a>
    &ensp;·&ensp;
    <a href="tietosuoja.html">Tietosuoja</a>
  </footer>

</div>

<script>
  const API_URL = '/api/translate'; // PRODUCTION — change to 'http://localhost:8000/api/translate' for local dev

  const inputEl    = document.getElementById('input-text');
  const editorEl   = document.getElementById('editor');
  const countEl    = document.getElementById('char-count');
  const btnConv    = document.getElementById('convert-btn');
  const btnClear   = document.getElementById('clear-btn');
  const outputWrap = document.getElementById('output-wrap');
  const outputEl   = document.getElementById('output-text');
  const btnCopy    = document.getElementById('copy-btn');

  const MAX = 5000;

  function renderParagraphs(text) {
    return text.split(/\n\n+/).map(para => {
      const div = document.createElement('div');
      div.textContent = para.trim();
      return `<p>${div.innerHTML}</p>`;
    }).join('');
  }

  const limitHint = document.getElementById('limit-hint');

  /* Initial fade-in: add .appeared after the animation delay so opacity
     transitions from 0 → 1 via CSS transition, not animation fill-mode.
     This keeps opacity in the normal cascade layer where :has() can override it. */
  setTimeout(() => editorEl.classList.add('appeared'), 120);

  inputEl.addEventListener('input', () => {
    const len = inputEl.value.length;
    countEl.textContent = `${len} / ${MAX}`;
    countEl.className = 'char-count' + (len > MAX ? ' over' : len > MAX * .85 ? ' warn' : '');
    const over = len > MAX;
    btnConv.disabled = len === 0 || over;
    btnClear.disabled = len === 0;
    limitHint.classList.toggle('visible', over);
  });

  btnConv.addEventListener('click', async () => {
    const text = inputEl.value.trim();
    if (!text) return;

    btnConv.classList.add('is-loading');
    btnConv.disabled = true;
    outputWrap.className = 'output state-loading';
    outputEl.classList.remove('visible');
    btnCopy.disabled = true;

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      const data = await response.json();

      if (response.ok && data.result) {
        outputEl.innerHTML = renderParagraphs(data.result);
        outputWrap.className = 'output state-done';
        requestAnimationFrame(() => {
          outputEl.classList.add('visible');
          btnCopy.disabled = false;
        });
      } else {
        const msg = (data && data.error) ? data.error : 'Jokin meni pieleen, yritä uudelleen.';
        const div = document.createElement('div');
        div.textContent = msg;
        outputEl.innerHTML = `<p>${div.innerHTML}</p>`;
        outputWrap.className = 'output state-done';
        outputEl.classList.add('visible');
      }
    } catch {
      const div = document.createElement('div');
      div.textContent = 'Yhteysongelma. Tarkista verkkoyhteys ja yritä uudelleen.';
      outputEl.innerHTML = `<p>${div.innerHTML}</p>`;
      outputWrap.className = 'output state-done';
      outputEl.classList.add('visible');
    } finally {
      btnConv.classList.remove('is-loading');
      btnConv.disabled = inputEl.value.length === 0 || inputEl.value.length > MAX;
    }
  });

  btnClear.addEventListener('click', () => {
    inputEl.value = '';
    countEl.textContent = `0 / ${MAX}`;
    countEl.className = 'char-count';
    btnConv.disabled = true;
    btnClear.disabled = true;
    btnCopy.disabled = true;
    outputEl.innerHTML = '';
    outputEl.classList.remove('visible');
    outputWrap.className = 'output state-empty';
  });

  btnCopy.addEventListener('click', () => {
    const text = outputEl.textContent;

    function showCopied() {
      const orig = btnCopy.innerHTML;
      btnCopy.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Kopioitu`;
      setTimeout(() => btnCopy.innerHTML = orig, 2000);
    }

    function showFailed() {
      const orig = btnCopy.innerHTML;
      btnCopy.innerHTML = '✕ Kopiointi epäonnistui';
      setTimeout(() => btnCopy.innerHTML = orig, 2000);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showCopied).catch(() => {
        execCommandFallback(text) ? showCopied() : showFailed();
      });
    } else {
      execCommandFallback(text) ? showCopied() : showFailed();
    }
  });

  function execCommandFallback(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      return true;
    } catch {
      return false;
    } finally {
      document.body.removeChild(ta);
    }
  }
</script>
</body>
</html>
