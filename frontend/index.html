<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selkokielelle</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111;
    }

    .subtitle {
      margin-top: 0.4rem;
      color: #555;
      font-size: 1rem;
    }

    .input-section {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      color: #222;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 0.9rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fafafa;
      border: 1.5px solid #d0d0d0;
      border-radius: 6px;
      resize: vertical;
      transition: border-color 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: #0057b7;
      background: #fff;
    }

    .char-counter {
      text-align: right;
      font-size: 0.85rem;
      color: #777;
      margin-top: 0.4rem;
    }

    .char-counter.over-limit {
      color: #c0392b;
      font-weight: 600;
    }

    .submit-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.75rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #0057b7;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #004494;
    }

    .submit-btn:disabled {
      background: #9ab8dc;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #555;
      font-style: italic;
    }

    .error-message {
      display: none;
      margin-top: 1.5rem;
      padding: 0.85rem 1rem;
      background: #fdf0ef;
      border: 1.5px solid #e5b8b4;
      border-radius: 6px;
      color: #8b1a14;
      font-size: 0.95rem;
    }

    .result-section {
      display: none;
      margin-top: 2rem;
    }

    .result-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 0.75rem;
    }

    .result-box {
      padding: 1.1rem 1.2rem;
      background: #f4f8ff;
      border: 1.5px solid #c0d8f5;
      border-radius: 6px;
      font-size: 1rem;
      line-height: 1.7;
      color: #1a1a1a;
      white-space: pre-wrap;
      word-break: break-word;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e8e8e8;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Selkokielelle</h1>
      <p class="subtitle">Muunna teksti helpommin luettavaksi selkokieleksi.</p>
    </header>

    <main>
      <div class="input-section">
        <label for="input-text">Syötä teksti</label>
        <textarea
          id="input-text"
          placeholder="Liitä tai kirjoita tähän muunnettava teksti..."
          maxlength="3000"
        ></textarea>
        <div class="char-counter" id="char-counter">0 / 3000</div>
      </div>

      <button class="submit-btn" id="submit-btn" type="button">
        Muunna selkokielelle
      </button>

      <div class="loading" id="loading">Muunnetaan&hellip;</div>

      <div class="error-message" id="error-message"></div>

      <div class="result-section" id="result-section">
        <h2>Selkokielinen teksti</h2>
        <div class="result-box" id="result-box"></div>
      </div>
    </main>

    <footer>
      selkokielelle.fi
    </footer>
  </div>

  <script>
    const API_URL = '/api/translate'; // PRODUCTION — change to 'http://localhost:8000/api/translate' for local dev

    const textarea = document.getElementById('input-text');
    const charCounter = document.getElementById('char-counter');
    const submitBtn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const errorMessage = document.getElementById('error-message');
    const resultSection = document.getElementById('result-section');
    const resultBox = document.getElementById('result-box');

    const MAX_CHARS = 3000;

    textarea.addEventListener('input', updateCounter);

    function updateCounter() {
      const count = textarea.value.length;
      charCounter.textContent = count + ' / ' + MAX_CHARS;
      if (count > MAX_CHARS) {
        charCounter.classList.add('over-limit');
      } else {
        charCounter.classList.remove('over-limit');
      }
    }

    submitBtn.addEventListener('click', handleSubmit);

    async function handleSubmit() {
      const text = textarea.value;

      if (!text || !text.trim()) {
        showError('Teksti ei voi olla tyhjä.');
        return;
      }

      if (text.length > MAX_CHARS) {
        showError('Teksti on liian pitkä. Enimmäispituus on 3000 merkkiä.');
        return;
      }

      setLoading(true);
      hideError();
      hideResult();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await response.json();

        if (response.ok && data.result) {
          showResult(data.result);
        } else {
          const msg = (data && data.error) ? data.error : 'Jokin meni pieleen, yritä uudelleen.';
          showError(msg);
        }
      } catch (err) {
        showError('Yhteysongelma. Tarkista verkkoyhteys ja yritä uudelleen.');
      } finally {
        setLoading(false);
      }
    }

    function setLoading(active) {
      submitBtn.disabled = active;
      loading.style.display = active ? 'block' : 'none';
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
    }

    function hideError() {
      errorMessage.style.display = 'none';
    }

    function showResult(text) {
      resultBox.textContent = text;
      resultSection.style.display = 'block';
    }

    function hideResult() {
      resultSection.style.display = 'none';
      resultBox.textContent = '';
    }
  </script>
</body>
</html>
